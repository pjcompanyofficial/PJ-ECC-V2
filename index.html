<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PJ Chat</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:sans-serif;
color:white;
}

header{
background:#ff7a00;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}

#videos{
display:flex;
flex-direction:column;
}

video{
width:100%;
background:black;
}

#remoteVideo{
height:45vh;
}

#localVideo{
height:35vh;
}

#recordBtn{
position:fixed;
bottom:20px;
left:20px;
width:80px;
height:80px;
border-radius:50%;
background:#ff7a00;
border:none;
}

#autoBtn{
position:fixed;
top:70px;
right:20px;
background:#ff7a00;
padding:10px;
border:none;
border-radius:10px;
color:white;
}

#qrBtn{
position:fixed;
top:120px;
right:20px;
background:#ff7a00;
padding:10px;
border:none;
border-radius:10px;
}

#roomBox{
padding:10px;
text-align:center;
}

input{
padding:10px;
border:none;
border-radius:8px;
}

button{
cursor:pointer;
}

#qrCanvas{
margin-top:10px;
}

</style>

</head>

<body>

<header>PJ Chat</header>

<div id="roomBox">
<input id="roomId" placeholder="room name">
<button onclick="joinRoom()">Connect</button>
<canvas id="qrCanvas"></canvas>
</div>

<div id="videos">
<video id="remoteVideo" autoplay playsinline></video>
<video id="localVideo" autoplay muted playsinline></video>
</div>

<button id="recordBtn"></button>
<button id="autoBtn">LIVE</button>
<button id="qrBtn">QR</button>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

const socket = io("https://signal-simple-peer.glitch.me")

let peer
let stream
let recorder
let chunks=[]
let autoMode=false

const localVideo=document.getElementById("localVideo")
const remoteVideo=document.getElementById("remoteVideo")
const recordBtn=document.getElementById("recordBtn")
const autoBtn=document.getElementById("autoBtn")
const qrBtn=document.getElementById("qrBtn")

async function startCam(){
stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true})
localVideo.srcObject=stream
}

startCam()

function joinRoom(){

let room=document.getElementById("roomId").value

socket.emit("join",room)

socket.on("ready",()=>{

peer=new SimplePeer({
initiator:true,
trickle:false,
stream:stream
})

peer.on("signal",data=>{
socket.emit("signal",data)
})

peer.on("stream",s=>{
remoteVideo.srcObject=s
})

peer.on("data",data=>{
let blob=new Blob([data],{type:"video/webm"})
let url=URL.createObjectURL(blob)

let v=document.createElement("video")
v.src=url
v.controls=true
v.style.width="100%"

document.body.appendChild(v)
})

})

socket.on("signal",data=>{
peer.signal(data)
})

}

recordBtn.onmousedown=startRecord
recordBtn.ontouchstart=startRecord

recordBtn.onmouseup=stopRecord
recordBtn.ontouchend=stopRecord

function startRecord(){

chunks=[]

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>{
chunks.push(e.data)
}

recorder.onstop=sendVideo

recorder.start()

}

function stopRecord(){

if(recorder){
recorder.stop()
}

}

function sendVideo(){

let blob=new Blob(chunks,{type:"video/webm"})

blob.arrayBuffer().then(buffer=>{
peer.send(buffer)
})

if(autoMode){
startRecord()
}

}

autoBtn.onclick=()=>{

autoMode=!autoMode

autoBtn.style.background=autoMode?"green":"#ff7a00"

if(autoMode){
startRecord()
}

}

qrBtn.onclick=()=>{

let room=document.getElementById("roomId").value

let link=location.href+"?room="+room

QRCode.toCanvas(document.getElementById("qrCanvas"),link)

}

</script>

</body>
</html>
